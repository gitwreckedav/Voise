# Release pipeline: push a version tag and GitHub builds + publishes
# the DMG for you. Your entire release ritual becomes:
#
#   1. bump APP_VERSION in config.py (e.g. "0.5.0") and commit
#   2. git tag v0.5.0
#   3. git push && git push --tags
#
# A few minutes later the DMG is attached to a GitHub Release, and
# running Voise apps see it via "Check for updates".

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed to create the release

jobs:
  build-dmg:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Build app + DMG
        run: bash scripts/build_app.sh

      - name: Publish release with DMG
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Voise-*.dmg
          generate_release_notes: true
